<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrailBites - Backpacking Menu Planner & Calorie Calculator</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel CDN (Compiles JSX in the browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Run React Component with Babel -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Curated Backpacking Food Database (Portions are single-person benchmarks)
    const FOOD_DATABASE = {
      breakfast: [
        { id: 'b1', name: 'Instant Oatmeal (2 packets)', calories: 320, weightOz: 3.0, category: 'Breakfast' },
        { id: 'b2', name: 'Granola w/ Powdered Whole Milk', calories: 450, weightOz: 3.5, category: 'Breakfast' },
        { id: 'b3', name: 'Dehydrated Breakfast Scramble', calories: 400, weightOz: 4.0, category: 'Breakfast' },
        { id: 'b4', name: 'Pop-Tarts (1 pack of 2)', calories: 400, weightOz: 3.5, category: 'Breakfast' },
        { id: 'b5', name: 'Peanut Butter Oatmeal Bowl', calories: 480, weightOz: 4.2, category: 'Breakfast' },
      ],
      lunch: [
        { id: 'l1', name: 'Tortillas with Peanut Butter & Honey', calories: 520, weightOz: 4.5, category: 'Lunch' },
        { id: 'l2', name: 'Tuna Packet with Ritz Crackers', calories: 350, weightOz: 4.8, category: 'Lunch' },
        { id: 'l3', name: 'Salami & Cheddar Cheese Tortilla', calories: 480, weightOz: 4.0, category: 'Lunch' },
        { id: 'l4', name: 'Ramen Noodles w/ Foil Chicken Packet', calories: 490, weightOz: 4.6, category: 'Lunch' },
        { id: 'l5', name: 'Hummus Powder & Olive Oil Wrap', calories: 410, weightOz: 3.8, category: 'Lunch' },
      ],
      dinner: [
        { id: 'd1', name: 'Dehydrated Beef Stroganoff', calories: 600, weightOz: 4.8, category: 'Dinner' },
        { id: 'd2', name: 'Backcountry Pesto Pasta w/ Pine Nuts', calories: 580, weightOz: 5.0, category: 'Dinner' },
        { id: 'd3', name: 'Chili Mac & Beef (Dehydrated)', calories: 620, weightOz: 4.9, category: 'Dinner' },
        { id: 'd4', name: 'Instant Mashed Potatoes w/ Bacon & Cheese', calories: 510, weightOz: 4.2, category: 'Dinner' },
        { id: 'd5', name: 'Dehydrated Pad Thai', calories: 570, weightOz: 4.7, category: 'Dinner' },
      ],
      snacks: [
        { id: 's1', name: 'Gourmet Trail Mix (Nuts & Chocolate)', calories: 280, weightOz: 2.0, category: 'Snacks' },
        { id: 's2', name: 'Snickers Chocolate Bar', calories: 250, weightOz: 1.8, category: 'Snacks' },
        { id: 's3', name: 'Beef Jerky (Peppered)', calories: 120, weightOz: 1.5, category: 'Snacks' },
        { id: 's4', name: 'Clif Bar (Energy Bar)', calories: 250, weightOz: 2.4, category: 'Snacks' },
        { id: 's5', name: 'Dried Mango Slices', calories: 160, weightOz: 1.8, category: 'Snacks' },
        { id: 's6', name: 'Dry Roasted Almonds', calories: 210, weightOz: 1.5, category: 'Snacks' },
      ]
    };

    function App() {
      // Theme and UI Wizard State
      const [isDarkMode, setIsDarkMode] = useState(false); // Default to gorgeous high-contrast light theme
      const [currentStep, setCurrentStep] = useState(1); // 1: Inputs/Profile, 2: Menu Planner, 3: Custom Pantry, 4: Finalized Groceries
      const [showSpecsPanel, setShowSpecsPanel] = useState(false);

      // Input parameters
      const [hikers, setHikers] = useState(2);
      const [days, setDays] = useState(3);
      const [hungerLevel, setHungerLevel] = useState('High'); // Low, Medium, High, Extreme
      const [avgBmi, setAvgBmi] = useState(23);
      const [distance, setDistance] = useState(15); // miles
      const [elevationGain, setElevationGain] = useState(2500); // feet
      const [hasEmergencyProvisions, setHasEmergencyProvisions] = useState(false); // Emergency provisions state

      // Derived plan length
      const totalPlanningDays = hasEmergencyProvisions ? days + 1 : days;

      // Daily Meal Plans
      const [menuPlan, setMenuPlan] = useState({});
      const [activeDay, setActiveDay] = useState(1);
      const [customFoodItem, setCustomFoodItem] = useState({
        name: '', calories: 300, weightOz: 3.0, category: 'Dinner'
      });
      const [customDatabase, setCustomDatabase] = useState([]);
      const [showNotification, setShowNotification] = useState(null);

      // Trigger auto-calculation on first load or changes
      useEffect(() => {
        autoGenerateMenu(false);
      }, [days, hasEmergencyProvisions]);

      // Handle active day index boundaries if day count shrinks
      useEffect(() => {
        if (activeDay > totalPlanningDays) {
          setActiveDay(totalPlanningDays);
        }
      }, [days, hasEmergencyProvisions, activeDay, totalPlanningDays]);

      // Nutritional & Metabolic Calculations
      const calculateRequirements = () => {
        const baselineBmr = 1200 + (avgBmi * 35); 
        const hungerMultipliers = {
          Low: 0.9,
          Medium: 1.0,
          High: 1.15,
          Extreme: 1.3
        };
        const hungerFactor = hungerMultipliers[hungerLevel] || 1.0;

        const dailyDistance = distance / days;
        const dailyElevation = elevationGain / days;

        const energyFromDistance = dailyDistance * 105;
        const energyFromElevation = (dailyElevation / 1000) * 160;

        const totalDailyRequiredPerPerson = Math.round(
          (baselineBmr * hungerFactor) + energyFromDistance + energyFromElevation
        );

        return {
          dailyRequiredPerPerson: totalDailyRequiredPerPerson,
          dailyDistance: dailyDistance.toFixed(1),
          dailyElevation: Math.round(dailyElevation),
          baseBmr: Math.round(baselineBmr),
        };
      };

      const metrics = calculateRequirements();

      // Handle active menu updates
      const setMealSelection = (day, mealType, foodObj) => {
        setMenuPlan(prev => ({
          ...prev,
          [day]: {
            ...prev[day],
            [mealType]: foodObj,
            [`${mealType}Qty`]: foodObj ? 1 : 0
          }
        }));
      };

      // Adjust meal quantities (Breakfast, Lunch, Dinner)
      const handleMealQtyChange = (day, mealType, change) => {
        setMenuPlan(prev => {
          const currentQty = prev[day]?.[`${mealType}Qty`] || 0;
          const newQty = Math.max(1, currentQty + change);
          return {
            ...prev,
            [day]: {
              ...prev[day],
              [`${mealType}Qty`]: newQty
            }
          };
        });
      };

      // Toggle Snack Selection (Defaults to Qty 1)
      const toggleSnackSelection = (day, foodObj) => {
        setMenuPlan(prev => {
          const currentDay = prev[day] || { breakfast: null, lunch: null, dinner: null, snacks: [] };
          const currentSnacks = currentDay.snacks || [];
          const exists = currentSnacks.some(s => s.id === foodObj.id);

          let updatedSnacks;
          if (exists) {
            updatedSnacks = currentSnacks.filter(s => s.id !== foodObj.id);
          } else {
            updatedSnacks = [...currentSnacks, { ...foodObj, qty: 1 }];
          }

          return {
            ...prev,
            [day]: {
              ...currentDay,
              snacks: updatedSnacks
            }
          };
        });
      };

      // Adjust Snack Quantities specifically
      const handleSnackQtyChange = (day, snackId, change) => {
        setMenuPlan(prev => {
          const currentDay = prev[day] || { breakfast: null, lunch: null, dinner: null, snacks: [] };
          const updatedSnacks = (currentDay.snacks || []).map(s => {
            if (s.id === snackId) {
              const newQty = Math.max(1, (s.qty || 1) + change);
              return { ...s, qty: newQty };
            }
            return s;
          });
          return {
            ...prev,
            [day]: {
              ...currentDay,
              snacks: updatedSnacks
            }
          };
        });
      };

      // Resolve calorie deficit with adaptive scaling of meals and snacks
      const resolveCalorieDeficit = (dayNum) => {
        const dayData = { ...menuPlan[dayNum] };
        if (!dayData) return;

        let bQty = dayData.breakfast ? (dayData.breakfastQty || 1) : 0;
        let lQty = dayData.lunch ? (dayData.lunchQty || 1) : 0;
        let dQty = dayData.dinner ? (dayData.dinnerQty || 1) : 0;
        let updatedSnacks = dayData.snacks ? dayData.snacks.map(s => ({ ...s })) : [];

        const getTempTotal = () => {
          let sum = 0;
          if (dayData.breakfast) sum += dayData.breakfast.calories * bQty;
          if (dayData.lunch) sum += dayData.lunch.calories * lQty;
          if (dayData.dinner) sum += dayData.dinner.calories * dQty;
          updatedSnacks.forEach(s => {
            sum += s.calories * (s.qty || 1);
          });
          return sum;
        };

        const target = metrics.dailyRequiredPerPerson;
        let currentCals = getTempTotal();

        if (currentCals >= target) {
          triggerNotification(`Day ${dayNum} already meets or exceeds caloric requirements!`);
          return;
        }

        // Step 1: Boost dinner portion (up to 3x)
        if (dayData.dinner) {
          while (currentCals < target && dQty < 3) {
            dQty++;
            currentCals = getTempTotal();
          }
        }

        // Step 2: Boost lunch portion (up to 3x)
        if (dayData.lunch) {
          while (currentCals < target && lQty < 3) {
            lQty++;
            currentCals = getTempTotal();
          }
        }

        // Step 3: Boost breakfast portion (up to 3x)
        if (dayData.breakfast) {
          while (currentCals < target && bQty < 3) {
            bQty++;
            currentCals = getTempTotal();
          }
        }

        // Step 4: Add snacks aggressively to cover any remaining gap
        const availableSnacks = [...FOOD_DATABASE.snacks, ...customDatabase.filter(f => f.category === 'Snacks')];
        availableSnacks.sort((a, b) => b.calories - a.calories); // Densest first

        let loopLimit = 0;
        while (currentCals < target && loopLimit < 15) {
          loopLimit++;
          let snackBoosted = false;

          // Boost existing assigned snacks first
          for (let i = 0; i < updatedSnacks.length; i++) {
            if (currentCals >= target) break;
            updatedSnacks[i].qty = (updatedSnacks[i].qty || 1) + 1;
            currentCals = getTempTotal();
            snackBoosted = true;
          }

          // If no snacks exist to boost, add the most calorie-dense snack
          if (!snackBoosted && availableSnacks.length > 0) {
            const topSnack = availableSnacks.find(as => !updatedSnacks.some(us => us.id === as.id)) || availableSnacks[0];
            updatedSnacks.push({ ...topSnack, qty: 1 });
            currentCals = getTempTotal();
          }
        }

        setMenuPlan(prev => ({
          ...prev,
          [dayNum]: {
            ...prev[dayNum],
            breakfastQty: bQty,
            lunchQty: lQty,
            dinnerQty: dQty,
            snacks: updatedSnacks
          }
        }));

        triggerNotification(`Day ${dayNum} deficit solved! Boosted portions and snack allotments to hit target.`);
      };

      // Copy current menu assignment & quantities to all days
      const applyActiveDayMenuToAll = () => {
        const activeMenu = menuPlan[activeDay];
        if (!activeMenu) return;

        const updatedPlan = {};
        for (let d = 1; d <= totalPlanningDays; d++) {
          updatedPlan[d] = {
            breakfast: activeMenu.breakfast,
            breakfastQty: activeMenu.breakfastQty || 1,
            lunch: activeMenu.lunch,
            lunchQty: activeMenu.lunchQty || 1,
            dinner: activeMenu.dinner,
            dinnerQty: activeMenu.dinnerQty || 1,
            snacks: activeMenu.snacks ? activeMenu.snacks.map(s => ({ ...s })) : []
          };
        }
        setMenuPlan(updatedPlan);
        triggerNotification(`Copied Day ${activeDay} Menu configurations & quantities to all ${totalPlanningDays} days!`);
      };

      // Helper to auto-generate plans based on calorie requirement levels
      const autoGenerateMenu = (displayNotification = true) => {
        const generated = {};
        const target = metrics.dailyRequiredPerPerson;

        for (let d = 1; d <= totalPlanningDays; d++) {
          let bIndex = 0;
          let lIndex = 0;
          let dIndex = 0;
          let bQty = 1;
          let lQty = 1;
          let dQty = 1;
          let snackList = [];

          // Establish premium core selections based on calorie baselines
          if (target > 3500) {
            bIndex = 4; // Peanut Butter Oatmeal Bowl
            lIndex = 0; // Tortillas with PB & Honey
            dIndex = 2; // Chili Mac
            bQty = 2;   // Automatically assign dual-portions for extreme requirements
            lQty = 2;
            dQty = 2;
            snackList = [
              { ...FOOD_DATABASE.snacks[0], qty: 2 },
              { ...FOOD_DATABASE.snacks[3], qty: 2 }
            ];
          } else if (target > 2800) {
            bIndex = 1; // Granola
            lIndex = 2; // Salami & Cheddar
            dIndex = 0; // Beef Stroganoff
            bQty = 1;
            lQty = 2;   // 2 wraps for lunch
            dQty = 1;
            snackList = [
              { ...FOOD_DATABASE.snacks[0], qty: 1 },
              { ...FOOD_DATABASE.snacks[3], qty: 1 }
            ];
          } else {
            bIndex = 0;
            lIndex = 1;
            dIndex = 3;
            bQty = 1;
            lQty = 1;
            dQty = 1;
            snackList = [
              { ...FOOD_DATABASE.snacks[1], qty: 1 }
            ];
          }

          // Aggressive check: if base targets are still unmet, boost dinners and lunches until satisfied
          let runningCalories = (FOOD_DATABASE.breakfast[bIndex].calories * bQty) +
                                (FOOD_DATABASE.lunch[lIndex].calories * lQty) +
                                (FOOD_DATABASE.dinner[dIndex].calories * dQty) +
                                snackList.reduce((acc, s) => acc + (s.calories * s.qty), 0);

          while (runningCalories < target) {
            dQty++;
            runningCalories += FOOD_DATABASE.dinner[dIndex].calories;
            if (runningCalories >= target) break;
            
            lQty++;
            runningCalories += FOOD_DATABASE.lunch[lIndex].calories;
            if (runningCalories >= target) break;

            if (snackList.length > 0) {
              snackList[0].qty++;
              runningCalories += snackList[0].calories;
            } else {
              snackList.push({ ...FOOD_DATABASE.snacks[0], qty: 1 });
              runningCalories += FOOD_DATABASE.snacks[0].calories;
            }
          }

          if (d % 2 === 0) {
            bIndex = (bIndex + 1) % FOOD_DATABASE.breakfast.length;
            lIndex = (lIndex + 1) % FOOD_DATABASE.lunch.length;
            dIndex = (dIndex + 1) % FOOD_DATABASE.dinner.length;
          }

          generated[d] = {
            breakfast: FOOD_DATABASE.breakfast[bIndex],
            breakfastQty: bQty,
            lunch: FOOD_DATABASE.lunch[lIndex],
            lunchQty: lQty,
            dinner: FOOD_DATABASE.dinner[dIndex],
            dinnerQty: dQty,
            snacks: snackList
          };
        }

        setMenuPlan(generated);
        if (displayNotification) {
          triggerNotification("Balanced smart menus generated successfully!");
        }
      };

      const triggerNotification = (msg) => {
        setShowNotification(msg);
        setTimeout(() => {
          setShowNotification(null);
        }, 4000);
      };

      // Add customized trail food
      const addCustomFood = (e) => {
        e.preventDefault();
        if (!customFoodItem.name.trim()) return;

        const newFood = {
          ...customFoodItem,
          id: `custom_${Date.now()}`,
        };

        setCustomDatabase(prev => [...prev, newFood]);
        triggerNotification(`Added custom food item: ${newFood.name}`);
        setCustomFoodItem({ name: '', calories: 300, weightOz: 3.0, category: 'Dinner' });
      };

      // Calculate day-specific nutritional tallies
      const getDayTotals = (dayIndex) => {
        const dayData = menuPlan[dayIndex];
        if (!dayData) return { calories: 0, weightOz: 0 };

        let totalCals = 0;
        let totalWeight = 0;

        if (dayData.breakfast) {
          const qty = dayData.breakfastQty || 1;
          totalCals += dayData.breakfast.calories * qty;
          totalWeight += dayData.breakfast.weightOz * qty;
        }
        if (dayData.lunch) {
          const qty = dayData.lunchQty || 1;
          totalCals += dayData.lunch.calories * qty;
          totalWeight += dayData.lunch.weightOz * qty;
        }
        if (dayData.dinner) {
          const qty = dayData.dinnerQty || 1;
          totalCals += dayData.dinner.calories * qty;
          totalWeight += dayData.dinner.weightOz * qty;
        }
        if (dayData.snacks) {
          dayData.snacks.forEach(s => {
            const qty = s.qty || 1;
            totalCals += s.calories * qty;
            totalWeight += s.weightOz * qty;
          });
        }

        return {
          calories: totalCals,
          weightOz: totalWeight
        };
      };

      // Calculate Trip Grand Totals for grocery checklist
      const getTripGrandTotals = () => {
        const consolidated = {};
        let totalWeightOz = 0;
        let totalCalsPlanned = 0;

        for (let d = 1; d <= totalPlanningDays; d++) {
          const dayData = menuPlan[d];
          if (!dayData) continue;

          if (dayData.breakfast) {
            const qty = dayData.breakfastQty || 1;
            totalCalsPlanned += dayData.breakfast.calories * qty;
            totalWeightOz += dayData.breakfast.weightOz * qty;
            const itemId = dayData.breakfast.id;
            if (consolidated[itemId]) {
              consolidated[itemId].qty += qty;
            } else {
              consolidated[itemId] = { ...dayData.breakfast, qty: qty };
            }
          }

          if (dayData.lunch) {
            const qty = dayData.lunchQty || 1;
            totalCalsPlanned += dayData.lunch.calories * qty;
            totalWeightOz += dayData.lunch.weightOz * qty;
            const itemId = dayData.lunch.id;
            if (consolidated[itemId]) {
              consolidated[itemId].qty += qty;
            } else {
              consolidated[itemId] = { ...dayData.lunch, qty: qty };
            }
          }

          if (dayData.dinner) {
            const qty = dayData.dinnerQty || 1;
            totalCalsPlanned += dayData.dinner.calories * qty;
            totalWeightOz += dayData.dinner.weightOz * qty;
            const itemId = dayData.dinner.id;
            if (consolidated[itemId]) {
              consolidated[itemId].qty += qty;
            } else {
              consolidated[itemId] = { ...dayData.dinner, qty: qty };
            }
          }

          if (dayData.snacks) {
            dayData.snacks.forEach(s => {
              const qty = s.qty || 1;
              totalCalsPlanned += s.calories * qty;
              totalWeightOz += s.weightOz * qty;
              if (consolidated[s.id]) {
                consolidated[s.id].qty += qty;
              } else {
                consolidated[s.id] = { ...s, qty: qty };
              }
            });
          }
        }

        const scaledItems = Object.values(consolidated).map(item => ({
          ...item,
          totalQty: item.qty * hikers,
          totalWeightLbs: ((item.weightOz * item.qty * hikers) / 16).toFixed(2)
        }));

        const finalWeightLbs = ((totalWeightOz * hikers) / 16).toFixed(1);
        const averageCalsPerDayPerson = totalPlanningDays > 0 ? Math.round(totalCalsPlanned / totalPlanningDays) : 0;

        return {
          groceryList: scaledItems,
          totalWeightLbs: finalWeightLbs,
          avgDailyCalsPerPerson: averageCalsPerDayPerson
        };
      };

      const tripTotals = getTripGrandTotals();

      // Smart Hiker Pack Weight Distribution Plan
      const calculateCargoDistribution = () => {
        const bundles = [];

        for (let d = 1; d <= totalPlanningDays; d++) {
          const dayData = menuPlan[d];
          if (!dayData) continue;

          const label = hasEmergencyProvisions && d === totalPlanningDays ? 'Emergency Day' : `Day ${d}`;

          if (dayData.breakfast) {
            const qty = dayData.breakfastQty || 1;
            const weightOz = dayData.breakfast.weightOz * qty * hikers;
            bundles.push({
              name: `${label} Breakfast`,
              desc: `${qty}x ${dayData.breakfast.name}`,
              weightOz,
              category: 'Breakfast'
            });
          }

          if (dayData.lunch) {
            const qty = dayData.lunchQty || 1;
            const weightOz = dayData.lunch.weightOz * qty * hikers;
            bundles.push({
              name: `${label} Lunch`,
              desc: `${qty}x ${dayData.lunch.name}`,
              weightOz,
              category: 'Lunch'
            });
          }

          if (dayData.dinner) {
            const qty = dayData.dinnerQty || 1;
            const weightOz = dayData.dinner.weightOz * qty * hikers;
            bundles.push({
              name: `${label} Dinner`,
              desc: `${qty}x ${dayData.dinner.name}`,
              weightOz,
              category: 'Dinner'
            });
          }

          if (dayData.snacks && dayData.snacks.length > 0) {
            dayData.snacks.forEach(s => {
              const qty = s.qty || 1;
              const weightOz = s.weightOz * qty * hikers;
              bundles.push({
                name: `${label} Snack`,
                desc: `${qty}x ${s.name}`,
                weightOz,
                category: 'Snacks'
              });
            });
          }
        }

        // Sort descending to assign largest bundles first
        bundles.sort((a, b) => b.weightOz - a.weightOz);

        // Initialize clean buckets for each hiker
        const hikerBuckets = Array.from({ length: hikers }, (_, i) => ({
          id: i + 1,
          weightOz: 0,
          bundles: []
        }));

        // Partition meals using greedy min-heap logic
        bundles.forEach(bundle => {
          let minBucket = hikerBuckets[0];
          hikerBuckets.forEach(b => {
            if (b.weightOz < minBucket.weightOz) {
              minBucket = b;
            }
          });
          minBucket.bundles.push(bundle);
          minBucket.weightOz += bundle.weightOz;
        });

        return hikerBuckets;
      };

      const cargoDistribution = calculateCargoDistribution();

      // Format grocery checklist copy
      const copyGroceryList = () => {
        let text = `🎒 TrailBites Backpacking Grocery List (${totalPlanningDays} Days - ${hikers} Hikers)\n`;
        text += `========================================================\n`;
        text += `🏕️ Physiological Daily Goal per Person: ${metrics.dailyRequiredPerPerson} kcal\n`;
        text += `🍽️ Current Planned Daily Calories: ${tripTotals.avgDailyCalsPerPerson} kcal\n`;
        text += `⚖️ Combined Food Pack Weight: ${tripTotals.totalWeightLbs} lbs\n\n`;
        
        const categories = ['Breakfast', 'Lunch', 'Dinner', 'Snacks'];
        categories.forEach(cat => {
          const catItems = tripTotals.groceryList.filter(i => i.category === cat);
          if (catItems.length > 0) {
            text += `🛒 ${cat.toUpperCase()}:\n`;
            catItems.forEach(i => {
              text += `  [ ] ${i.name} — Qty: ${i.totalQty} (Total: ${i.totalWeightLbs} lbs)\n`;
            });
            text += `\n`;
          }
        });

        // Fallback for document context copy environments
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);

        triggerNotification("Copied grocery checklist to your clipboard!");
      };

      return (
        <div className={`min-h-screen transition-colors duration-300 font-sans ${isDarkMode ? 'bg-[#130032] text-white' : 'bg-[#F8F3F0] text-[#130032]'}`}>
          {/* Banner Notification */}
          {showNotification && (

                        <div className="flex items-center gap-1.5">
                          <button onClick={() => handleMealQtyChange(activeDay, 'breakfast', -1)} className="w-6 h-6 rounded flex items-center justify-center font-bold text-xs border">-</button>
                          <span className="w-5 text-center font-black text-xs text-emerald-600">{(menuPlan[activeDay]?.breakfastQty || 0)}x</span>
                          <button onClick={() => handleMealQtyChange(activeDay, 'breakfast', 1)} className="w-6 h-6 rounded flex items-center justify-center font-bold text-xs bg-[#4C00FF] text-white">+</button>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Lunch */}
                  <div className={`border rounded-xl p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4 ${isDarkMode ? 'border-[#26065D] bg-[#130032]/40' : 'border-[#CBC2FF] bg-[#F8F3F0]/40'}`}>
                    <div className="flex items-start gap-3 flex-1">
                      <span className="p-2 bg-[#4C00FF]/10 border-[#4C00FF]/20 rounded-lg text-blue-500">☀️</span>
                      <div>
                        <div className="text-[10px] uppercase font-black tracking-widest text-[#4C00FF]">Lunch</div>
                        <div className="text-sm font-bold mt-0.5">{menuPlan[activeDay]?.lunch?.name || "None selected"}</div>
                        <div className="text-xs text-slate-500 dark:text-slate-400 mt-0.5 font-mono">
                          {menuPlan[activeDay]?.lunch ? `${menuPlan[activeDay].lunch.calories * (menuPlan[activeDay]?.lunchQty || 1)} kcal | ${(menuPlan[activeDay].lunch.weightOz * (menuPlan[activeDay]?.lunchQty || 1)).toFixed(1)} oz total` : '--'}
                        </div>
                      </div>
                    </div>
                    <div className="flex flex-col gap-2 w-full sm:w-64">
                      <select
                        value={menuPlan[activeDay]?.lunch?.id || ''}
                        onChange={(e) => {
                          const food = [...FOOD_DATABASE.lunch, ...customDatabase].find(f => f.id === e.target.value);
                          setMealSelection(activeDay, 'lunch', food);
                        }}
                        className={`w-full border text-xs rounded-lg p-2.5 font-bold focus:outline-none ${isDarkMode ? 'bg-[#130032] border-[#26065D] text-white' : 'bg-white border-[#CBC2FF] text-[#130032]'}`}
                      >
                        <option value="">-- Choose Lunch --</option>
                        {[...FOOD_DATABASE.lunch, ...customDatabase.filter(f => f.category === 'Lunch')].map((f) => (
                          <option key={f.id} value={f.id}>{f.name} ({f.calories} kcal)</option>
                        ))}
                      </select>
                      <div className={`flex items-center justify-between gap-2 px-3 py-1.5 rounded-lg border ${menuPlan[activeDay]?.lunch ? 'bg-[#4C00FF]/5 border-[#4C00FF]/20 text-[#4C00FF]' : 'opacity-40 pointer-events-none'}`}>
                        <span className="text-[10px] font-black uppercase">Portions:</span>
                        <div className="flex items-center gap-1.5">
                          <button onClick={() => handleMealQtyChange(activeDay, 'lunch', -1)} className="w-6 h-6 rounded flex items-center justify-center font-bold text-xs border">-</button>
                          <span className="w-5 text-center font-black text-xs text-emerald-600">{(menuPlan[activeDay]?.lunchQty || 0)}x</span>
                          <button onClick={() => handleMealQtyChange(activeDay, 'lunch', 1)} className="w-6 h-6 rounded flex items-center justify-center font-bold text-xs bg-[#4C00FF] text-white">+</button>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Dinner */}
                  <div className={`border rounded-xl p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4 ${isDarkMode ? 'border-[#26065D] bg-[#130032]/40' : 'border-[#CBC2FF] bg-[#F8F3F0]/40'}`}>
                    <div className="flex items-start gap-3 flex-1">
                      <span className="p-2 bg-[#4C00FF]/10 border-[#4C00FF]/20 rounded-lg text-purple-500">🌌</span>
                      <div>
                        <div className="text-[10px] uppercase font-black tracking-widest text-[#4C00FF]">Dinner</div>
                        <div className="text-sm font-bold mt-0.5">{menuPlan[activeDay]?.dinner?.name || "None selected"}</div>
                        <div className="text-xs text-slate-500 dark:text-slate-400 mt-0.5 font-mono">
                          {menuPlan[activeDay]?.dinner ? `${menuPlan[activeDay].dinner.calories * (menuPlan[activeDay]?.dinnerQty || 1)} kcal | ${(menuPlan[activeDay].dinner.weightOz * (menuPlan[activeDay]?.dinnerQty || 1)).toFixed(1)} oz total` : '--'}
                        </div>
                      </div>
                    </div>
                    <div className="flex flex-col gap-2 w-full sm:w-64">
                      <select
                        value={menuPlan[activeDay]?.dinner?.id || ''}
                        onChange={(e) => {
                          const food = [...FOOD_DATABASE.dinner, ...customDatabase].find(f => f.id === e.target.value);
                          setMealSelection(activeDay, 'dinner', food);
                        }}
                        className={`w-full border text-xs rounded-lg p-2.5 font-bold focus:outline-none ${isDarkMode ? 'bg-[#130032] border-[#26065D] text-white' : 'bg-white border-[#CBC2FF] text-[#130032]'}`}
                      >
                        <option value="">-- Choose Dinner --</option>
                        {[...FOOD_DATABASE.dinner, ...customDatabase.filter(f => f.category === 'Dinner')].map((f) => (
                          <option key={f.id} value={f.id}>{f.name} ({f.calories} kcal)</option>
                        ))}
                      </select>
                      <div className={`flex items-center justify-between gap-2 px-3 py-1.5 rounded-lg border ${menuPlan[activeDay]?.dinner ? 'bg-[#4C00FF]/5 border-[#4C00FF]/20 text-[#4C00FF]' : 'opacity-40 pointer-events-none'}`}>
                        <span className="text-[10px] font-black uppercase">Portions:</span>
                        <div className="flex items-center gap-1.5">
                          <button onClick={() => handleMealQtyChange(activeDay, 'dinner', -1)} className="w-6 h-6 rounded flex items-center justify-center font-bold text-xs border">-</button>
                          <span className="w-5 text-center font-black text-xs text-emerald-400">{(menuPlan[activeDay]?.dinnerQty || 0)}x</span>
                          <button onClick={() => handleMealQtyChange(activeDay, 'dinner', 1)} className="w-6 h-6 rounded flex items-center justify-center font-bold text-xs bg-[#4C00FF] text-white">+</button>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Snacks */}
                  <div className={`border rounded-xl p-4 space-y-3 ${isDarkMode ? 'border-[#26065D] bg-[#130032]/40' : 'border-[#CBC2FF] bg-[#F8F3F0]/40'}`}>
                    <div className="flex items-start gap-3">
                      <span className="p-2 bg-[#4C00FF]/10 border-[#4C00FF]/20 rounded-lg text-[#4C00FF]">🎒</span>
                      <div>
                        <div className="text-[10px] uppercase font-black tracking-widest text-[#4C00FF]">Snack Provisions</div>
                        <p className="text-xs text-slate-500 font-medium">Add snacks and customize quantity:</p>
                      </div>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-2.5 pt-1">
                      {[...FOOD_DATABASE.snacks, ...customDatabase.filter(f => f.category === 'Snacks')].map((snack) => {
                        const matchedSnack = menuPlan[activeDay]?.snacks?.find(s => s.id === snack.id);
                        const isChecked = !!matchedSnack;
                        const snackQty = matchedSnack?.qty || 0;

                        return (
                          <div key={snack.id} className={`flex items-center justify-between p-2.5 rounded-lg border text-xs select-none transition-colors ${isChecked ? 'bg-[#4C00FF]/10 border-[#4C00FF] text-white' : isDarkMode ? 'bg-[#130032] border-[#26065D] text-white/50' : 'bg-white border-[#CBC2FF] text-[#130032]/75'}`}>
                            <label className="flex items-center gap-2.5 cursor-pointer flex-1 py-1">
                              <input type="checkbox" checked={isChecked} onChange={() => toggleSnackSelection(activeDay, snack)} className="rounded accent-[#4C00FF] text-[#4C00FF] focus:ring-0 cursor-pointer" />
                              <div className="flex flex-col">
                                <span className="font-bold">{snack.name}</span>
                                <span className="text-slate-500 font-medium">{snack.calories * (snackQty || 1)} kcal</span>
                              </div>
                            </label>
                            {isChecked && (
                              <div className="flex items-center gap-1">
                                <button onClick={() => handleSnackQtyChange(activeDay, snack.id, -1)} className="w-6 h-6 rounded flex items-center justify-center font-bold border">-</button>
                                <span className="w-5 text-center font-black">{snackQty}x</span>
                                <button onClick={() => handleSnackQtyChange(activeDay, snack.id, 1)} className="w-6 h-6 rounded flex items-center justify-center font-bold bg-[#4C00FF] text-white">+</button>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  <div className="flex justify-between gap-4 pt-4 border-t border-slate-300 dark:border-slate-800">
                    <button onClick={() => setCurrentStep(1)} className="px-5 py-2.5 border rounded-xl font-bold text-xs hover:bg-slate-100 dark:hover:bg-slate-800">← Back to Profile</button>
                    <div className="flex gap-2">
                      <button onClick={() => setCurrentStep(3)} className="px-5 py-2.5 border rounded-xl font-bold text-xs hover:bg-slate-100 dark:hover:bg-slate-800">Custom Pantry →</button>
                      <button onClick={() => setCurrentStep(4)} className="px-5 py-2.5 bg-[#4C00FF] text-white font-black rounded-xl text-xs hover:bg-[#4C00FF]/90">Finalize Grocery List →</button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* Step 3: Custom Pantry */}
            {currentStep === 3 && (
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 animate-fade-in">
                <div className={`lg:col-span-5 border rounded-2xl p-6 shadow-xl ${isDarkMode ? 'bg-[#26065D]/30 border-[#4C00FF]/10' : 'bg-white border-[#CBC2FF]'}`}>
                  <h2 className="text-lg font-black mb-4 flex items-center gap-2"><span>🍳</span> Create Custom Meal</h2>
                  <p className="text-xs text-slate-500 mb-6">Add personal recipes or custom trail provisions directly to selection pools.</p>
                  <form onSubmit={addCustomFood} className="space-y-4">
                    <div>
                      <label className="block text-[10px] font-bold uppercase tracking-wider mb-1">Food Item Name</label>
                      <input type="text" placeholder="e.g. Grandma's Trail Chili" value={customFoodItem.name} onChange={(e) => setCustomFoodItem({ ...customFoodItem, name: e.target.value })} className={`w-full border rounded-xl px-4 py-2 text-sm font-bold focus:outline-none ${isDarkMode ? 'bg-[#130032] border-[#26065D] text-white' : 'bg-[#F8F3F0] border-[#CBC2FF]'}`} />
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <label className="block text-[10px] font-bold uppercase tracking-wider mb-1">Calories (kcal)</label>
                        <input type="number" value={customFoodItem.calories} onChange={(e) => setCustomFoodItem({ ...customFoodItem, calories: parseInt(e.target.value) || 0 })} className={`w-full border rounded-xl px-4 py-2 text-sm font-bold focus:outline-none ${isDarkMode ? 'bg-[#130032] border-[#26065D] text-white' : 'bg-[#F8F3F0] border-[#CBC2FF]'}`} />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold uppercase tracking-wider mb-1">Dry Weight (oz)</label>
                        <input type="number" step="0.1" value={customFoodItem.weightOz} onChange={(e) => setCustomFoodItem({ ...customFoodItem, weightOz: parseFloat(e.target.value) || 0 })} className={`w-full border rounded-xl px-4 py-2 text-sm font-bold focus:outline-none ${isDarkMode ? 'bg-[#130032] border-[#26065D] text-white' : 'bg-[#F8F3F0] border-[#CBC2FF]'}`} />
                      </div>
                    </div>
                    <div>
                      <label className="block text-[10px] font-bold uppercase tracking-wider mb-1">Category</label>
                      <select value={customFoodItem.category} onChange={(e) => setCustomFoodItem({ ...customFoodItem, category: e.target.value })} className={`w-full border rounded-xl px-3 py-2.5 text-sm font-bold focus:outline-none ${isDarkMode ? 'bg-[#130032] border-[#26065D] text-white' : 'bg-[#F8F3F0] border-[#CBC2FF]'}`}>
                        <option value="Breakfast">Breakfast</option>
                        <option value="Lunch">Lunch</option>
                        <option value="Dinner">Dinner</option>
                        <option value="Snacks">Snacks</option>
                      </select>
                    </div>
                    <button type="submit" className="w-full py-3 bg-[#4C00FF] text-white font-black text-xs uppercase rounded-xl">Save to Pantry</button>
                  </form>
                </div>

                <div className={`lg:col-span-7 border rounded-2xl p-6 shadow-xl ${isDarkMode ? 'bg-[#26065D]/30 border-[#4C00FF]/10' : 'bg-white border-[#CBC2FF]'}`}>
                  <h3 className="text-sm font-bold uppercase tracking-wider text-[#4C00FF] mb-4">Your Custom Provisions ({customDatabase.length})</h3>
                  <div className="space-y-2 max-h-[350px] overflow-y-auto pr-2 brand-scrollbar">
                    {customDatabase.map((item) => (
                      <div key={item.id} className={`flex items-center justify-between p-3 rounded-lg border text-sm ${isDarkMode ? 'bg-[#130032] border-[#26065D]' : 'bg-[#F8F3F0] border-[#CBC2FF]'}`}>
                        <div>
                          <div className="font-bold">{item.name}</div>
                          <div className="text-xs text-slate-500 mt-0.5">{item.category} • {item.calories} kcal</div>
                        </div>
                        <div className="flex items-center gap-3">
                          <span className="font-mono text-xs px-2 py-1 bg-slate-200 dark:bg-slate-800 rounded font-semibold text-[#4C00FF]">{item.weightOz} oz</span>
                          <button onClick={() => setCustomDatabase(prev => prev.filter(f => f.id !== item.id))} className="text-[#FF5252] hover:underline text-xs font-bold">Remove</button>
                        </div>
                      </div>
                    ))}
                    {customDatabase.length === 0 && <div className="text-center py-12 text-slate-500 text-xs font-bold">No custom items built yet.</div>}
                  </div>

                  <div className="flex justify-between gap-4 pt-6 border-t border-slate-300 dark:border-slate-800 mt-6">
                    <button onClick={() => setCurrentStep(2)} className="px-5 py-2.5 border rounded-xl font-bold text-xs hover:bg-slate-100 dark:hover:bg-slate-800">← Back to Planner</button>
                    <button onClick={() => setCurrentStep(4)} className="px-5 py-2.5 bg-[#4C00FF] text-white font-black rounded-xl text-xs hover:bg-[#4C00FF]/90">Compile Final Grocery List →</button>
                  </div>
                </div>
              </div>
            )}

            {/* Step 4: Finalize Grocery */}
            {currentStep === 4 && (
              <div className="max-w-4xl mx-auto space-y-8 animate-fade-in">
                <div className="bg-gradient-to-br from-[#4C00FF] to-[#26065D] text-white rounded-3xl p-8 shadow-2xl relative overflow-hidden">
                  <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full blur-3xl"></div>
                  <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                    <div>
                      <span className="text-[10px] font-black tracking-widest uppercase text-[#CBC2FF]">Final Logistics Confirmation</span>
                      <h2 className="text-2xl font-black mt-1">TrailBites Summary</h2>
                    </div>
                    <button onClick={copyGroceryList} className="px-5 py-3 bg-white text-[#130032] hover:bg-[#F8F3F0] text-xs font-black uppercase tracking-wider rounded-xl shadow-lg flex items-center gap-2">
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1" /></svg>
                      Copy shopping Checklist
                    </button>
                  </div>

                  <div className="grid grid-cols-1 sm:grid-cols-3 gap-6 mt-8 border-t border-white/10 pt-6 text-center sm:text-left">
                    <div>
                      <span className="text-[10px] uppercase font-bold text-[#CBC2FF]">Total dry Weight</span>
                      <div className="text-3xl font-black mt-1">{tripTotals.totalWeightLbs} lbs</div>
                      <p className="text-[10px] text-white/60">Scaled for {hikers} hikers</p>
                    </div>
                    <div>
                      <span className="text-[10px] uppercase font-bold text-[#CBC2FF]">Avg Calorie Balance</span>
                      <div className="text-3xl font-black mt-1">{tripTotals.avgDailyCalsPerPerson} kcal</div>
                      <p className="text-[10px] text-white/60">Goal: {metrics.dailyRequiredPerPerson} kcal/day</p>
                    </div>
                    <div>
                      <span className="text-[10px] uppercase font-bold text-[#CBC2FF]">Trip duration</span>
                      <div className="text-3xl font-black mt-1">{totalPlanningDays} Days</div>
                      <p className="text-[10px] text-white/60">{distance} miles total</p>
                    </div>
                  </div>
                </div>

                {/* Pack Distribution Plan */}
                <div className={`border rounded-3xl p-6 shadow-xl space-y-4 ${isDarkMode ? 'bg-[#26065D]/30 border-[#4C00FF]/10' : 'bg-white border-[#CBC2FF]'}`}>
                  <div>
                    <h3 className="text-lg font-black text-[#4C00FF] uppercase tracking-wider flex items-center gap-2">⚖️ Smart Hiker Weight Distribution Plan</h3>
                    <p className="text-xs text-slate-500 mt-1 leading-relaxed">Daily meals stay consolidated in packs to keep kitchen tasks organized, while pack weights are distributed as evenly as possible.</p>
                  </div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {cargoDistribution.map((hiker) => (
                      <div key={hiker.id} className={`p-4 rounded-2xl border ${isDarkMode ? 'bg-[#130032] border-[#26065D]' : 'bg-[#F8F3F0] border-[#CBC2FF]'}`}>
                        <div className="flex justify-between items-center border-b border-[#CBC2FF]/40 pb-2 mb-3">
                          <span className="font-black text-sm text-[#4C00FF]">⛺ Hiker {hiker.id} loadout</span>
                          <span className="font-mono text-xs font-black bg-[#4C00FF]/10 text-[#4C00FF] px-2.5 py-1 rounded-lg">{(hiker.weightOz / 16).toFixed(2)} lbs</span>
                        </div>
                        {hiker.bundles.length > 0 ? (
                          <div className="space-y-2 max-h-[180px] overflow-y-auto pr-1 brand-scrollbar">
                            {hiker.bundles.map((b, bIdx) => (
                              <div key={bIdx} className="flex justify-between items-start text-xs text-[#130032]/80 dark:text-slate-200">
                                <div className="flex flex-col">
                                  <span className="font-bold text-[#130032] dark:text-slate-100">{b.name}</span>
                                  <span className="text-[10px] text-slate-500 font-medium">{b.desc}</span>
                                </div>
                                <span className="font-mono text-slate-500 font-bold">{(b.weightOz / 16).toFixed(2)} lbs</span>
                              </div>
                            ))}
                          </div>
                        ) : (
                          <span className="text-xs text-slate-400">Empty Pack Slot</span>
                        )}
                      </div>
                    ))}
                  </div>
                </div>

                {/* Grocery Checklist */}
                <div className={`border rounded-3xl p-6 shadow-xl space-y-6 ${isDarkMode ? 'bg-[#26065D]/30 border-[#4C00FF]/10' : 'bg-white border-[#CBC2FF]'}`}>
                  <h3 className="text-lg font-black text-[#130032] dark:text-slate-300 uppercase tracking-wider flex items-center gap-2"><span>🛒</span> Grocery Checklist</h3>
                  <div className="space-y-6">
                    {['Breakfast', 'Lunch', 'Dinner', 'Snacks'].map((category) => {
                      const categoryItems = tripTotals.groceryList.filter(item => item.category === category);
                      if (categoryItems.length === 0) return null;

                      return (
                        <div key={category} className="space-y-2">
                          <h4 className="text-[11px] font-black text-[#4C00FF] uppercase tracking-widest border-b border-[#CBC2FF]/30 pb-1">{category} Items</h4>
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                            {categoryItems.map((item) => (
                              <div key={item.id} className={`flex items-center justify-between p-3 rounded-xl border ${isDarkMode ? 'bg-[#130032]/60 border-[#26065D]' : 'bg-[#F8F3F0] border-[#CBC2FF]'}`}>
                                <div className="flex items-center gap-3">
                                  <span className="w-6 h-6 flex items-center justify-center text-xs font-black bg-[#4C00FF]/10 text-[#4C00FF] border border-[#4C00FF]/20 rounded-md">{item.totalQty}</span>
                                  <span className="font-bold text-xs sm:text-sm">{item.name}</span>
                                </div>
                                <span className="font-mono text-xs text-slate-500 dark:text-slate-400 font-bold">{item.totalWeightLbs} lbs</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  <div className="flex justify-between pt-6 border-t border-slate-300 dark:border-slate-800">
                    <button onClick={() => setCurrentStep(2)} className={`px-5 py-2.5 border rounded-xl font-bold text-xs transition-colors ${isDarkMode ? 'border-slate-700 hover:bg-slate-800' : 'border-slate-300 hover:bg-slate-100 text-[#130032]'}`}>← Adjust Menu Plan</button>
                    <button onClick={() => { setCurrentStep(1); autoGenerateMenu(false); }} className="px-5 py-2.5 bg-[#4C00FF] text-white font-black rounded-xl text-xs hover:bg-[#4C00FF]/90">Start New Calculation ↺</button>
                  </div>
                </div>
              </div>
            )}
          </main>

          <footer className={`border-t transition-colors duration-300 mt-12 py-8 ${isDarkMode ? 'border-[#26065D] bg-[#130032]' : 'border-[#CBC2FF] bg-[#FFFFFF]'}`}>
            <div className="max-w-7xl mx-auto px-4 text-center text-[10px] text-slate-500 space-y-2">
              <p>© 2026 TrailBites Backcountry Logistics Corp — Styled under DocuSign's Digital Application Brand System Rules.</p>
              <p>Always verify nutritional strategies with physical strain baselines and safety recommendations.</p>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
